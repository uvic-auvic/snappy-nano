controller:
  ros__parameters:
    # Boot-time setpoint only; the mission planner overwrites these via /planner/task.
    # Keep z at 0.0 so the sub does not dive on controller startup.
    target_position: [0.0, 0.0, 0.0]
    target_roll: 0.0
    target_pitch: 0.0
    target_yaw: 0.0
    
    pid_x: [1.0, 0.0, 0.5]
    pid_y: [1.0, 0.0, 0.5]
    pid_z: [8.0, 0.3, 3.0]
    pid_roll: [0.0, 0.0, 0.0]
    pid_pitch: [0.0, 0.0, 0.0]
    #pid_yaw: [0.3, 0.0, 0.5]
    pid_yaw: [0.5, 0.1, 0.5]
