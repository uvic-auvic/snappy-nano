  - {x: 4.0, y: 0.0, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # move past gate measure this! 
  - {x: 0.0, y: 0.75, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # go right
  - {x: 1.5, y: 0.0, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # go forward
  - {x: 0.0, y: 1.0, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # go right 
  - {x: 2.0, y: 0.0, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # go forward jenny's 100000% sure about this
  - {x: 0.0, y: -0.75, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # go left
  - {x: 2.0, y: 0.0, z: 0.0, pitch: 0.0, roll: 0.0, yaw: 0.0} # go forward, should be 1m past slalom

