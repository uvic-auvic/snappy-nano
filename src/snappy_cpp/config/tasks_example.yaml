# Task list for the planner node (pass via the task_file param).
# Angles are in degrees; z is carried for schema consistency but the
# controller's target depth is pinned by controller_params.yaml.
tasks:
  - {x: 4.0, y: 0.0, z: 0.5, pitch: 0.0, roll: 0.0, yaw: 0.0} # Depth 
  - {x: 4.0, y: 2.0, z: 0.5, pitch: 0.0, roll: 0.0, yaw: 0.0} # Gate
 # - {x: 2.0, y: 2.0, z: 0.5, pitch: 0.0, roll: 0.0, yaw: 0.0} #

 semis:
